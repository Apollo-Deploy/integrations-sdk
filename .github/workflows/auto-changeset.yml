name: Auto Changeset

# Automatically generates a Changesets entry from the pushed commit message,
# then pushes it so that the existing release.yml can create the Version PR
# and publish to npm.
#
# Prerequisites:
#   - Add a Personal Access Token (PAT) as the secret GH_PAT so that the
#     commit pushed by this action re-triggers other workflows (e.g. release.yml).
#     A plain GITHUB_TOKEN push is silently ignored by GitHub Actions.
#     Minimum required scopes: repo (or contents: write for fine-grained PATs).
#
# Conventional commit → bump mapping:
#   <type>!: / BREAKING CHANGE → major
#   feat:                      → minor
#   fix: / perf: / refactor:
#   / docs: / chore: / ci:
#   / test: / style: / etc.    → patch
#
# Skipped commits:
#   - "chore: version packages"              (release.yml)
#   - "chore: add auto-generated changeset"  (this workflow)
#   - Merge commits (e.g. "Merge pull request #123")

on:
  push:
    branches:
      - main

concurrency:
  group: auto-changeset-${{ github.ref }}
  cancel-in-progress: false

jobs:
  auto-changeset:
    name: Generate changeset from commit
    runs-on: ubuntu-latest

    # Skip commits produced by this workflow, the release workflow, or merge commits.
    if: |
      !startsWith(github.event.head_commit.message, 'chore: version packages') &&
      !startsWith(github.event.head_commit.message, 'chore: add auto-generated changeset') &&
      !startsWith(github.event.head_commit.message, 'Merge ')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          # Use a PAT so the pushed commit re-triggers release.yml.
          # Falls back to GITHUB_TOKEN (won't trigger other workflows).
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      # ── Step 1: Determine bump type + affected packages ──────────────────────

      - name: Detect bump type and changed packages
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          COMMIT_MSG="$(git log -1 --pretty=%B)"
          COMMIT_SUBJECT="$(git log -1 --pretty=%s)"
          echo "Subject : $COMMIT_SUBJECT"

          # ── Bump type from conventional commit prefix ──────────────────────
          # Any conventional type with `!` or a BREAKING CHANGE footer → major
          if echo "$COMMIT_MSG" | grep -qE '^[a-z]+(\(.+\))?!:|^BREAKING[ -]CHANGE'; then
            BUMP="major"
          elif echo "$COMMIT_MSG" | grep -qE '^feat(\(.+\))?:'; then
            BUMP="minor"
          else
            BUMP="patch"
          fi
          echo "Bump     : $BUMP"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

          # ── Identify which packages have source changes ────────────────────
          CHANGED="$(git diff --name-only HEAD~1 HEAD)"
          echo "Changed files:"
          echo "$CHANGED"

          # Filter out release/versioning artifacts. package.json is intentionally
          # NOT excluded — dep updates and other legitimate changes must still
          # trigger a changeset. The job-level `if` already blocks the
          # "chore: version packages" commits that would otherwise loop.
          NON_RELEASE_CHANGES="$(echo "$CHANGED" | grep -Ev '^\.changeset/|/CHANGELOG\.md$|^bun\.lock$' || true)"
          if [ -z "$NON_RELEASE_CHANGES" ]; then
            echo "Only release/versioning files changed — skipping changeset creation."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── Dynamically discover packages and check for changes ────────────
          FRONTMATTER=""
          for pkg_json in packages/*/package.json; do
            pkg_dir="$(dirname "$pkg_json")"
            pkg_name="$(jq -r '.name' "$pkg_json")"

            # Skip private packages — they are not published to npm.
            is_private="$(jq -r '.private // false' "$pkg_json")"
            if [ "$is_private" = "true" ]; then
              continue
            fi

            if echo "$NON_RELEASE_CHANGES" | grep -q "^${pkg_dir}/"; then
              FRONTMATTER="${FRONTMATTER}\"${pkg_name}\": ${BUMP}"$'\n'
            fi
          done

          if [ -z "$FRONTMATTER" ]; then
            echo "No package source changes detected — skipping changeset creation."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            printf '%s' "$FRONTMATTER" > /tmp/frontmatter.txt
            echo "Affected packages:"
            cat /tmp/frontmatter.txt
          fi

      # ── Step 2: Write the .changeset/*.md file ───────────────────────────────

      - name: Write changeset file
        if: steps.detect.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          HASH="$(git rev-parse --short HEAD)"
          FILE=".changeset/auto-${HASH}.md"

          # Guard against duplicate changeset for the same commit SHA.
          if [ -f "$FILE" ]; then
            echo "Changeset $FILE already exists — skipping."
            echo "CHANGESET_SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi

          DESCRIPTION="$(git log -1 --pretty=%s)"

          {
            printf -- '---\n'
            cat /tmp/frontmatter.txt
            printf -- '---\n\n'
            printf '%s\n' "$DESCRIPTION"
          } > "$FILE"

          echo "Written $FILE:"
          cat "$FILE"

      # ── Step 3: Commit and push the changeset file ───────────────────────────

      - name: Commit and push changeset
        if: steps.detect.outputs.skip != 'true' && env.CHANGESET_SKIP != 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .changeset/

          # Nothing staged → file already existed (duplicate SHA); bail out cleanly.
          if git diff --cached --quiet; then
            echo "Changeset already exists for this commit — nothing to push."
            exit 0
          fi

          git commit -m "chore: add auto-generated changeset"

          # Rebase on top of any concurrent pushes before pushing.
          git pull --rebase origin main
          git push
